# p2p network config

# Module is the name of p2p module plugin.(p2pv1 | p2pv2)
module: p2pv2
# Port the p2p network listened
port: 47101
# Address multiaddr string
address: /ip4/0.0.0.0/tcp/47101
# IsTls config the node use tls secure transparent
isTls: false
# KeyPath is the netdisk private key path
keyPath: netkeys
# BootNodes config the bootNodes the node to connect
# service name
serviceName: localhost
bootNodes:
  - "/ip4/172.18.0.4/tcp/47111/p2p/QmQKp8pLWSgV4JiGjuULKV1JsdpxUtnDEUMP8sGaaUbwVL"
  - "/ip4/172.18.0.10/tcp/47121/p2p/QmZXjZibcL5hy2Ttv5CnAQnssvnCbPEGBzqk7sAnL69R1E"
