      - xuperchain-network
    depends_on:
      - sub2-node1
      - sub2-node2

  # 副链3 - 节点1
  sub3-node1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xuperchain-sub3-node1
    ports:
      - "37104:37104"
      - "47104:47104"
      - "37304:37304"
    volumes:
      - ./chains/subchain3/node1/data:/home/xchain/data
      - ./chains/subchain3/node1/conf:/home/xchain/conf
      - ./chains/subchain3/node1/logs:/home/xchain/logs
      - ./chains/subchain3/node1/tmp:/home/xchain/tmp
    environment:
      - CONTAINER_NAME=xuperchain-sub3-node1
      - CHAIN_NAME=subchain3
      - NODE_NAME=node1
    networks:
      - xuperchain-network
    depends_on:
      - main-node1

  # 副链3 - 节点2
  sub3-node2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xuperchain-sub3-node2
    ports:
      - "37114:37114"
      - "47114:47114"
      - "37314:37314"
    volumes:
      - ./chains/subchain3/node2/data:/home/xchain/data
      - ./chains/subchain3/node2/conf:/home/xchain/conf
      - ./chains/subchain3/node2/logs:/home/xchain/logs
      - ./chains/subchain3/node2/tmp:/home/xchain/tmp
    environment:
      - CONTAINER_NAME=xuperchain-sub3-node2
      - CHAIN_NAME=subchain3
      - NODE_NAME=node2
    networks:
      - xuperchain-network
    depends_on:
      - sub3-node1

  # 副链3 - 节点3
  sub3-node3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xuperchain-sub3-node3
    ports:
      - "37124:37124"
      - "47124:47124"
      - "37324:37324"
    volumes:
      - ./chains/subchain3/node3/data:/home/xchain/data
      - ./chains/subchain3/node3/conf:/home/xchain/conf
      - ./chains/subchain3/node3/logs:/home/xchain/logs
      - ./chains/subchain3/node3/tmp:/home/xchain/tmp
